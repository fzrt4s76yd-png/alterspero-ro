yamlname: Weekly Content Generator

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic feedparser requests beautifulsoup4

      - name: Generate and inject article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_INDEX_PATH: index.html
          SITE_SITEMAP_PATH: sitemap.xml
        run: python scripts/generate_article.py

      - name: Commit and push
        run: |
          git config user.name "AlterSpero Bot"
          git config user.email "bot@alterspero.ro"
          git add -A
          git status
          git commit -m "articol saptamanal $(date '+%Y-%m-%d')" || echo "Nimic de commit"
          git push origin main
